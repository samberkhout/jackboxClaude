services:
  # Combined Backend + Frontend Server
  - type: web
    name: party-game-server
    env: node
    region: frankfurt
    rootDir: .
    buildCommand: npm install && npm run build && cd server && npm install
    startCommand: cd server && node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
